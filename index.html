<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>VirtualBox Boot Sim</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Fullscreen container -->
  <div id="app">

    <!-- Splash screen (shows provided asset) -->
    <div id="splash" class="stage" tabindex="0">
      <img src="/vbox-new-splash.webp" id="splash-img" alt="VirtualBox Splash">
    </div>

    <!-- BIOS screen (shown if F12 pressed during splash) -->
    <div id="bios" class="stage hidden" aria-hidden="true">
      <div id="bios-panel" role="dialog" aria-label="System Options">
        <header id="bios-header">
          <h2>System Options</h2>
          <div class="bios-hint">Press Esc to exit</div>
          <button id="kbd-toggle" aria-pressed="false" title="Virtual Keyboard">⌨︎</button>
        </header>

        <nav class="menu">
          <div class="menu-group">
            <button class="menu-btn" data-action="shutdown-options">ShutDown Options ▸</button>
            <div class="submenu" data-for="shutdown-options">
              <button class="submenu-item" data-action="shutdown">Shutdown</button>
              <button class="submenu-item" data-action="restart">Restart</button>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="screen-options">Screen Options ▸</button>
            <div class="submenu" data-for="screen-options">
              <button class="submenu-item" data-action="fullscreen">Full screen</button>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="disk">Disk ▸</button>
            <div class="submenu visible" data-for="disk">
              <button class="submenu-item" data-action="select-disk">Select A Disk ▸</button>
              <div class="submenu nested visible" data-for="select-disk">
                <button class="submenu-item" data-action="hard-disk">Hard Disk ▸</button>
                <div class="submenu nested visible" data-for="hard-disk">
                  <button class="disk-item" data-disk-name="Windows XP" data-disk-url="https://xp.quenq.com/">Windows XP</button>
                  <button class="disk-item" data-disk-name="win11-21h1-harddisk.iso" data-disk-url="https://win11.blueedge.me/">win11-21h1-harddisk.iso</button>
                  <button class="disk-item" data-disk-name="macos-harddisk" data-disk-url="https://www.macos-web.app/">macos-harddisk</button>
                  <button class="disk-item" data-disk-name="Windows 98" data-disk-url="https://mock98.on.websim.com/">Windows 98</button>
                  <!-- Upload Hard Disk: lets user enter a website URL which is added as a disk named <host>-harddisk -->
                  <button class="disk-upload submenu-item" data-action="upload-harddisk">Upload Hard Disk (Website)</button>
                </div>
              </div>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="ram-settings">Memory (RAM) ▸</button>
            <div class="submenu" data-for="ram-settings">
              <div style="padding:8px 12px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;">
                <label style="font-family:monospace;font-size:14px;color:#333;">Allocated RAM: <span id="ram-value" style="font-weight:600">512 MB</span></label>
                <input id="ram-slider" type="range" min="1" max="1000" step="1" value="512" style="width:100%;">
                <small style="color:#666;font-family:monospace;">Adjust how much RAM is allocated to the virtual machine.</small>
              </div>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="hz-settings">Refresh Rate (Hz) ▸</button>
            <div class="submenu" data-for="hz-settings">
              <div style="padding:8px 12px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;">
                <label style="font-family:monospace;font-size:14px;color:#333;">Refresh Rate: <span id="hz-value" style="font-weight:600">60.00 Hz</span></label>
                <input id="hz-slider" type="range" min="56.25" max="98.95" step="0.01" value="60.00" style="width:100%;">
                <small style="color:#666;font-family:monospace;">Set a refresh rate between 56.25 Hz and 98.95 Hz.</small>
              </div>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="boot-sector">Boot Sector ▸</button>
            <div class="submenu" data-for="boot-sector">
              <button class="submenu-item" data-action="boot-sector-open">Open Boot Sector</button>
            </div>
          </div>

          <div class="menu-group">
            <button class="menu-btn" data-action="hide-bios">Hide</button>
          </div>
        </nav>

        <!-- Boot sector confirmation modal (lifted out of submenu so it is reliably visible) -->
        <div id="boot-sector-modal" class="hidden" role="dialog" aria-hidden="true" aria-label="Boot Sector Warning" style="z-index:130;position:relative;margin:14px auto;padding:14px;background:#fff;border:1px solid #eee;border-radius:10px;max-width:820px;width:calc(100% - 44px);box-shadow:0 8px 30px rgba(0,0,0,0.08);">
          <div style="color:#111;font-family:monospace;line-height:1.4;">
            <strong>BS Logins</strong><br>
            SYSTEM User Account<br>
            You can't change system files. Are you sure you want to continue?
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;justify-content:flex-end;">
            <button id="boot-sector-no" class="submenu-item" style="background:#fff">No</button>
            <button id="boot-sector-yes" class="submenu-item" style="background:#fee">Yes</button>
          </div>
        </div>

        <!-- Virtual keyboard container (hidden by default) -->
        <div id="virtual-kbd" class="virtual-kbd hidden" aria-hidden="true" role="application" aria-label="Virtual Keyboard"></div>

        <footer id="bios-footer">
          <small class="muted">Use touch or click to choose an option.</small>
        </footer>
      </div>
    </div>

    <!-- Boot text stage -->
    <div id="boot" class="stage hidden">
      <div id="boot-text" aria-hidden="true">
        <!-- Lines will be filled by script -->
      </div>
    </div>

    <!-- Final iframe stage (shows external site) -->
    <div id="runtime" class="stage hidden">
      <iframe id="site-frame" src="about:blank" frameborder="0" sandbox="allow-same-origin allow-forms allow-scripts allow-popups allow-modals" allow="fullscreen" allowfullscreen></iframe>
    </div>
  </div>

  <script src="script.js" type="module"></script>
</body>
</html>
